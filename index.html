<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Passive Vertical Design Calculator — KG5IEF (3D)</title>

<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  h1 { font-size: 28px; margin-bottom: 10px; }
  h2 { margin-top: 30px; }
  .summary-block {
    background: #f0f0f0;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 18px;
  }
  .build-block {
    background: #e8f4ff;
    padding: 15px;
    border-radius: 8px;
    margin-top: 25px;
    font-size: 17px;
  }
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  table, th, td { border: 1px solid #999; }
  th, td { padding: 8px; text-align: center; }
  .download-btn {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
  }
  #plotsContainer {
    margin-top: 25px;
  }
  #azimuthPlot, #elevationPlot, #pattern3D {
    width: 100%;
    max-width: 900px;
    margin: 0 auto 30px auto;
    height: 450px;
  }
  #gainSummary table, #gainDetails table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  #gainSummary th, #gainSummary td,
  #gainDetails th, #gainDetails td {
    border: 1px solid #999;
    padding: 6px;
    text-align: center;
  }
  #toggleGainDetails {
    display: inline-block;
    margin: 5px 0 15px 0;
    cursor: pointer;
    color: #0066cc;
    text-decoration: underline;
  }
</style>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<h1>KG5IEF — Passive Vertical / Vertical Yagi Calculator (with 3D Pattern)</h1>

<label>Frequency (MHz): </label>
<input type="number" id="freq" value="146.000" step="0.001">
<br><br>

<label><input type="checkbox" id="useReflector"> Add Reflector</label>
<br><br>

<label>Number of Directors:</label>
<select id="directors">
  <option value="0" selected>0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
</select>
<br><br>

<label><input type="checkbox" id="elevatedRadials"> Elevated Radials (0.05 λ above ground)</label>

<h2 id="gainLine"></h2>

<div id="summary" class="summary-block"></div>

<h2>Element Table</h2>
<div id="tableContainer"></div>

<div id="plotsContainer">
  <h2>Radiation Patterns</h2>

  <div id="azimuthPlot"></div>

  <div id="gainSummary"></div>
  <a href="#" id="toggleGainDetails">Show advanced gain metrics</a>
  <div id="gainDetails" style="display:none;"></div>

  <div id="elevationPlot"></div>

  <h2>3D Radiation Pattern (Absolute Gain, dBi)</h2>
  <div id="pattern3D"></div>
</div>

<div id="build" class="build-block"></div>

<button class="download-btn" onclick="downloadFile()">Download Results</button>

<script>
// ---------- Utility: meters → feet/inches ----------
function toFeetInches(m) {
  let totalInches = m * 39.3701;
  let feet = Math.floor(totalInches / 12);
  let inches = totalInches % 12;
  let frac = Math.round((inches - Math.floor(inches)) * 16);
  if (frac === 16) { inches += 1; frac = 0; }
  return `${feet} ft ${Math.floor(inches)} ${frac}/16 in`;
}

// ---------- Base forward gain (dBi) ----------
function baseGain(nDir, hasRef) {
  if (!hasRef && nDir === 0) return 2.1;
  if (hasRef && nDir === 0) return 5.0;
  if (hasRef && nDir === 1) return 6.0;
  if (hasRef && nDir === 2) return 6.7;
  if (hasRef && nDir === 3) return 7.0;
  if (!hasRef && nDir === 1) return 4.0;
  if (!hasRef && nDir === 2) return 4.8;
  if (!hasRef && nDir === 3) return 5.2;
  return 2.1;
}

// ---------- Array model ----------
function buildArrayModel(hasRef, nDir, lambda) {
  let positions = [];
  let amps = [];
  let phases = [];

  let refSpacing = 0.15 * lambda;
  let dirSpacing = 0.10 * lambda;

  if (hasRef) {
    positions.push(-refSpacing);
    amps.push(0.9);
    phases.push(-140 * Math.PI / 180);
  }

  positions.push(0.0);
  amps.push(1.0);
  phases.push(0.0);

  for (let i = 1; i <= nDir; i++) {
    positions.push(i * dirSpacing);
    amps.push(0.8);
    phases.push(60 * Math.PI / 180);
  }

  return { positions, amps, phases };
}

// ---------- Element factor (vertical monopole) ----------
function verticalElementFactor(theta) {
  let st = Math.sin(theta);
  if (st < 1e-6) st = 1e-6;
  let ct = Math.cos(theta);
  return Math.abs(Math.cos((Math.PI / 2) * ct) / st);
}

// ---------- Array factor ----------
function arrayFactor(theta, phi, k, positions, amps, phases) {
  let re = 0, im = 0;
  let sx = Math.sin(theta) * Math.cos(phi);
  for (let i = 0; i < positions.length; i++) {
    let phase = phases[i] + k * positions[i] * sx;
    re += amps[i] * Math.cos(phase);
    im += amps[i] * Math.sin(phase);
  }
  return Math.sqrt(re*re + im*im);
}

// ---------- Azimuth pattern (normalized dB) ----------
function computeAzimuthPattern(lambda, hasRef, nDir) {
  let angles = [];
  let dBs = [];

  // Single 1/4-wave vertical: omnidirectional in azimuth
  if (!hasRef && nDir === 0) {
    for (let deg = 0; deg < 360; deg += 2) {
      angles.push(deg);
      dBs.push(0);
    }
    return { angles, dBs };
  }

  let k = 2 * Math.PI / lambda;
  let { positions, amps, phases } = buildArrayModel(hasRef, nDir, lambda);

  let theta = Math.PI / 2;
  let ef = verticalElementFactor(theta);

  let vals = [];
  let maxVal = 0;

  for (let deg = 0; deg < 360; deg += 2) {
    let phi = deg * Math.PI / 180;
    let field = arrayFactor(theta, phi, k, positions, amps, phases) * ef;
    vals.push(field);
    if (field > maxVal) maxVal = field;
    angles.push(deg);
  }

  for (let v of vals) {
    let d = 20 * Math.log10(v / (maxVal || 1));
    if (!isFinite(d)) d = -60;
    if (d < -30) d = -30;
    dBs.push(d);
  }

  return { angles, dBs };
}

// ---------- Elevation pattern (normalized dB) ----------
function computeElevationPattern(lambda, hasRef, nDir) {
  let k = 2 * Math.PI / lambda;
  let { positions, amps, phases } = buildArrayModel(hasRef, nDir, lambda);

  let phi = 0;
  let angles = [], dBs = [], vals = [], maxVal = 0;

  // Include horizon (90°) explicitly; avoid theta=0° singularity
  for (let deg = 1; deg <= 90; deg++) {
    let theta = deg * Math.PI / 180;
    let ef = verticalElementFactor(theta);
    let af = arrayFactor(theta, phi, k, positions, amps, phases);
    let field = af * ef;
    vals.push(field);
    if (field > maxVal) maxVal = field;
    angles.push(deg);
  }

  for (let v of vals) {
    let d = 20 * Math.log10(v / (maxVal || 1));
    if (!isFinite(d)) d = -60;
    if (d < -30) d = -30;
    dBs.push(d);
  }

  return { angles, dBs };
}

// ---------- Azimuth gain analysis ----------
function analyzeAzimuth(az, forwardAbs_dBi) {
  let angles = az.angles;
  let dBs = az.dBs;

  let fIdx = angles.indexOf(0);
  if (fIdx === -1) fIdx = 0;
  let fAbs_dBi = forwardAbs_dBi;
  let fAbs_dBd = fAbs_dBi - 2.15;

  let bIdx = angles.indexOf(180);
  let bRel = (bIdx !== -1) ? dBs[bIdx] : Math.min(...dBs);
  let bAbs_dBi = fAbs_dBi + bRel;
  let fbRatio = fAbs_dBi - bAbs_dBi;

  let thr3 = -3;
  let valid3 = angles.filter((a, i) => dBs[i] >= thr3);
  let bw3 = valid3.length ? (Math.max(...valid3) - Math.min(...valid3)) : 360;

  let thr10 = -10;
  let valid10 = angles.filter((a, i) => dBs[i] >= thr10);
  let bw10 = valid10.length ? (Math.max(...valid10) - Math.min(...valid10)) : 360;

  let mainMin = valid3.length ? Math.min(...valid3) : 0;
  let mainMax = valid3.length ? Math.max(...valid3) : 0;
  let sideRel = -30;
  for (let i = 0; i < angles.length; i++) {
    let a = angles[i];
    if (a < mainMin || a > mainMax) {
      if (dBs[i] > sideRel) sideRel = dBs[i];
    }
  }
  let sideAbs_dBi = fAbs_dBi + sideRel;
  let fsRatio = fAbs_dBi - sideAbs_dBi;

  let sumLin = 0;
  for (let d of dBs) sumLin += Math.pow(10, d / 10);
  let avgLin = sumLin / dBs.length;
  let effPct = avgLin * 100;

  return {
    forwardAbs_dBi: fAbs_dBi,
    forwardAbs_dBd: fAbs_dBd,
    backAbs_dBi: bAbs_dBi,
    fbRatio: fbRatio,
    bw3: bw3,
    bw10: bw10,
    sideAbs_dBi: sideAbs_dBi,
    fsRatio: fsRatio,
    effPct: effPct
  };
}

// ---------- 3D pattern (absolute dBi) ----------
function compute3DPattern(lambda, hasRef, nDir, forwardAbs_dBi) {
  let k = 2 * Math.PI / lambda;
  let { positions, amps, phases } = buildArrayModel(hasRef, nDir, lambda);

  let thetaSteps = 181; // 0..180
  let phiSteps = 361;   // 0..360

  let thetaVals = [];
  let phiVals = [];
  for (let i = 0; i < thetaSteps; i++) thetaVals.push(i * Math.PI / 180);
  for (let j = 0; j < phiSteps; j++) phiVals.push(j * Math.PI / 180);

  let maxField = 0;
  let fieldGrid = new Array(thetaSteps);
  for (let i = 0; i < thetaSteps; i++) {
    fieldGrid[i] = new Array(phiSteps);
    let theta = thetaVals[i];
    let ef = verticalElementFactor(theta);
    for (let j = 0; j < phiSteps; j++) {
      let phi = phiVals[j];
      let af = arrayFactor(theta, phi, k, positions, amps, phases);
      let field = af * ef;
      fieldGrid[i][j] = field;
      if (field > maxField) maxField = field;
    }
  }

  if (maxField <= 0) maxField = 1;

  let x = [], y = [], z = [], gain = [];
  let maxAbs = -Infinity, minAbs = Infinity;

  for (let i = 0; i < thetaSteps; i++) {
    let theta = thetaVals[i];
    let xRow = [], yRow = [], zRow = [], gRow = [];
    for (let j = 0; j < phiSteps; j++) {
      let phi = phiVals[j];
      let rel = fieldGrid[i][j] / maxField;
      let rel_dB = 20 * Math.log10(rel);
      if (!isFinite(rel_dB)) rel_dB = -60;
      let abs_dBi = forwardAbs_dBi + rel_dB;

      let r = Math.max(0, abs_dBi - (forwardAbs_dBi - 30));
      let st = Math.sin(theta);
      let ct = Math.cos(theta);
      let sp = Math.sin(phi);
      let cp = Math.cos(phi);

      let xx = r * st * cp;
      let yy = r * st * sp;
      let zz = r * ct;

      xRow.push(xx);
      yRow.push(yy);
      zRow.push(zz);
      gRow.push(abs_dBi);

      if (abs_dBi > maxAbs) maxAbs = abs_dBi;
      if (abs_dBi < minAbs) minAbs = abs_dBi;
    }
    x.push(xRow);
    y.push(yRow);
    z.push(zRow);
    gain.push(gRow);
  }

  return { x, y, z, gain, minAbs, maxAbs };
}

// ---------- Plot updater ----------
function updatePlots(lambda, hasRef, nDir, forwardAbs_dBi) {
  let az = computeAzimuthPattern(lambda, hasRef, nDir);
  let el = computeElevationPattern(lambda, hasRef, nDir);

  // Azimuth (normalized)
  Plotly.newPlot("azimuthPlot", [{
    type: "scatterpolar",
    r: az.dBs,
    theta: az.angles,
    mode: "lines",
    line: { color: "blue" }
  }], {
    title: "Azimuth Pattern (Horizontal, dBi-normalized)",
    polar: {
      radialaxis: { range: [-30, 0], dtick: 5, angle: 90 },
      angularaxis: { direction: "counterclockwise" }
    }
  });

  // Elevation (absolute dBi)
  let elAbs = el.dBs.map(d => d + forwardAbs_dBi);
  let minEl = forwardAbs_dBi - 30;
  let maxEl = forwardAbs_dBi;

  Plotly.newPlot("elevationPlot", [{
    x: el.angles,
    y: elAbs,
    mode: "lines",
    line: { color: "red", width: 3 }
  }, {
    x: [90, 90],
    y: [minEl, maxEl],
    mode: "lines",
    line: { color: "gray", width: 1, dash: "dot" },
    showlegend: false
  }], {
    title: "Elevation Pattern (Vertical, Absolute Gain)",
    xaxis: { title: "Elevation Angle (degrees)", range: [0, 90] },
    yaxis: { title: "Gain (dBi)", range: [minEl, maxEl], dtick: 5 }
  });

  // Gain tables
  let g = analyzeAzimuth(az, forwardAbs_dBi);

  document.getElementById("gainSummary").innerHTML = `
    <h3>Gain Summary</h3>
    <table>
      <tr>
        <th>Forward Gain</th>
        <th>Back-Lobe Gain</th>
        <th>Front-to-Back Ratio</th>
        <th>Beamwidth (-3 dB)</th>
      </tr>
      <tr>
        <td>${g.forwardAbs_dBi.toFixed(1)} dBi (${g.forwardAbs_dBd.toFixed(1)} dBd)</td>
        <td>${g.backAbs_dBi.toFixed(1)} dBi</td>
        <td>${g.fbRatio.toFixed(1)} dB</td>
        <td>${g.bw3.toFixed(1)}°</td>
      </tr>
    </table>
  `;

  document.getElementById("gainDetails").innerHTML = `
    <h3>Advanced Gain Metrics</h3>
    <table>
      <tr>
        <th>Forward Gain</th>
        <th>Back-Lobe Gain</th>
        <th>Side-Lobe Level</th>
        <th>Beamwidth (-3 dB)</th>
        <th>Beamwidth (-10 dB)</th>
        <th>F/B Ratio</th>
        <th>F/S Ratio</th>
        <th>Pattern Efficiency</th>
      </tr>
      <tr>
        <td>${g.forwardAbs_dBi.toFixed(1)} dBi (${g.forwardAbs_dBd.toFixed(1)} dBd)</td>
        <td>${g.backAbs_dBi.toFixed(1)} dBi</td>
        <td>${g.sideAbs_dBi.toFixed(1)} dBi</td>
        <td>${g.bw3.toFixed(1)}°</td>
        <td>${g.bw10.toFixed(1)}°</td>
        <td>${g.fbRatio.toFixed(1)} dB</td>
        <td>${g.fsRatio.toFixed(1)} dB</td>
        <td>${g.effPct.toFixed(1)} %</td>
      </tr>
    </table>
  `;

  // 3D pattern
  let p3d = compute3DPattern(lambda, hasRef, nDir, forwardAbs_dBi);

  Plotly.newPlot("pattern3D", [{
    type: "surface",
    x: p3d.x,
    y: p3d.y,
    z: p3d.z,
    surfacecolor: p3d.gain,
    colorscale: "Jet",
    colorbar: { title: "Gain (dBi)" }
  }], {
    title: "3D Radiation Pattern (Absolute Gain, dBi)",
    scene: {
      xaxis: { title: "X" },
      yaxis: { title: "Y" },
      zaxis: { title: "Z" },
      aspectmode: "data"
    }
  });
}

// ---------- Main calculator ----------
function calculate() {
  let fMHz = parseFloat(document.getElementById("freq").value);
  let nDir = parseInt(document.getElementById("directors").value);
  let hasRef = document.getElementById("useReflector").checked;
  let elevated = document.getElementById("elevatedRadials").checked;

  let c = 299792458;
  let lambda = c / (fMHz * 1e6);

  let drivenLen = 0.48 * lambda;
  let refLen = 0.52 * lambda;
  let dirLen = 0.45 * lambda;

  let refSpacing = 0.15 * lambda;
  let dirSpacing = 0.10 * lambda;

  let radialLen = 0.25 * lambda;
  let radialHt = 0.05 * lambda;

  let back = hasRef ? refSpacing : 0;
  let front = nDir * dirSpacing;
  let totalSpan = back + front;

  let gain_dBi = baseGain(nDir, hasRef);
  let effBoost = elevated ? 0.8 : 0.0;
  let finalGain_dBi = gain_dBi + effBoost;
  let finalGain_dBd = finalGain_dBi - 2.15;

  document.getElementById("gainLine").innerHTML =
    `${finalGain_dBi.toFixed(1)} dBi (${finalGain_dBd.toFixed(1)} dBd) — vertical configuration at ${fMHz.toFixed(3)} MHz`;

  document.getElementById("summary").innerHTML = `
    <b>Passive Vertical / Vertical Yagi Array</b><br>
    Frequency: ${fMHz.toFixed(3)} MHz<br>
    Wavelength: ${lambda.toFixed(3)} m = ${toFeetInches(lambda)}<br>
    Driven Element: ${drivenLen.toFixed(3)} m = ${toFeetInches(drivenLen)}<br>
    Reflector: ${hasRef ? "Yes" : "No"}<br>
    Directors: ${nDir}<br>
    Total Boom Length: ${totalSpan.toFixed(3)} m = ${toFeetInches(totalSpan)}<br>
    Radial System: ${elevated ? "Elevated (0.05 λ)" : "Ground-mounted"}<br>
    Radial Length: ${radialLen.toFixed(3)} m = ${toFeetInches(radialLen)}
  `;

  let html = `<table>
    <tr>
      <th>Element</th><th>Length (m)</th><th>Length (ft/in)</th>
      <th>Position (m)</th><th>Position (ft/in)</th>
      <th>Radial Length</th><th>Radial Height</th>
    </tr>`;

  if (hasRef) {
    html += `<tr>
      <td>Reflector</td>
      <td>${refLen.toFixed(3)}</td>
      <td>${toFeetInches(refLen)}</td>
      <td>${(-refSpacing).toFixed(3)}</td>
      <td>${toFeetInches(-refSpacing)}</td>
      <td>${toFeetInches(radialLen)}</td>
      <td>${elevated ? toFeetInches(radialHt) : "Ground"}</td>
    </tr>`;
  }

  html += `<tr>
    <td>Driven</td>
    <td>${drivenLen.toFixed(3)}</td>
    <td>${toFeetInches(drivenLen)}</td>
    <td>0.000</td>
    <td>0 ft 0 in</td>
    <td>${toFeetInches(radialLen)}</td>
    <td>${elevated ? toFeetInches(radialHt) : "Ground"}</td>
  </tr>`;

  for (let i = 1; i <= nDir; i++) {
    let pos = i * dirSpacing;
    html += `<tr>
      <td>Director ${i}</td>
      <td>${dirLen.toFixed(3)}</td>
      <td>${toFeetInches(dirLen)}</td>
      <td>${pos.toFixed(3)}</td>
      <td>${toFeetInches(pos)}</td>
      <td>${toFeetInches(radialLen)}</td>
      <td>${elevated ? toFeetInches(radialHt) : "Ground"}</td>
    </tr>`;
  }

  html += `</table>`;
  document.getElementById("tableContainer").innerHTML = html;

  updatePlots(lambda, hasRef, nDir, finalGain_dBi);

  document.getElementById("build").innerHTML = `
    <b>How to Build This Antenna</b><br><br>
    • Each element needs its own ¼‑wave radial system.<br>
    • Elevated radials (0.05 λ) improve efficiency by ~0.8 dB.<br>
    • Use a 1:1 choke at the feedpoint.<br>
    • Reflector spacing: 0.15 λ behind driven.<br>
    • Director spacing: 0.10 λ in front of driven.<br>
    • Keep metal at least 0.1 λ away.<br><br>
    <b>dBi vs dBd</b><br>
    • dBi = isotropic reference.<br>
    • dBd = dipole reference (dBd = dBi − 2.15).<br>
  `;
}

// ---------- Download summary ----------
function downloadFile() {
  let text = document.getElementById("summary").innerText;
  let blob = new Blob([text], {type: "text/plain"});
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Passive_Vertical_Design_Calculator_3D.txt";
  link.click();
}

// ---------- Event wiring ----------
document.getElementById("freq").addEventListener("input", calculate);
document.getElementById("directors").addEventListener("change", calculate);
document.getElementById("useReflector").addEventListener("change", calculate);
document.getElementById("elevatedRadials").addEventListener("change", calculate);

document.getElementById("toggleGainDetails").addEventListener("click", function(e) {
  e.preventDefault();
  let d = document.getElementById("gainDetails");
  if (d.style.display === "none" || d.style.display === "") {
    d.style.display = "block";
    this.textContent = "Hide advanced gain metrics";
  } else {
    d.style.display = "none";
    this.textContent = "Show advanced gain metrics";
  }
});

// ---------- Auto-run on load ----------
window.addEventListener("load", calculate);
</script>

</body>
</html>
