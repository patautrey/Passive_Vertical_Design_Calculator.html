<script>
// ---------- Utility: meters → feet/inches ----------
function toFeetInches(m) {
  let totalInches = m * 39.3701;
  let feet = Math.floor(totalInches / 12);
  let inches = totalInches % 12;
  let frac = Math.round((inches - Math.floor(inches)) * 16);
  if (frac === 16) { inches += 1; frac = 0; }
  return `${feet} ft ${Math.floor(inches)} ${frac}/16 in`;
}

// ---------- Base forward gain (dBi) ----------
function baseGain(nDir, hasRef) {
  if (!hasRef && nDir === 0) return 2.1;
  if (hasRef && nDir === 0) return 5.0;
  if (hasRef && nDir === 1) return 6.0;
  if (hasRef && nDir === 2) return 6.7;
  if (hasRef && nDir === 3) return 7.0;
  if (!hasRef && nDir === 1) return 4.0;
  if (!hasRef && nDir === 2) return 4.8;
  if (!hasRef && nDir === 3) return 5.2;
  return 2.1;
}

// ---------- Array model ----------
function buildArrayModel(hasRef, nDir, lambda) {
  let positions = [];
  let amps = [];
  let phases = [];

  let refSpacing = 0.15 * lambda;
  let dirSpacing = 0.10 * lambda;

  if (hasRef) {
    positions.push(-refSpacing);
    amps.push(0.9);
    phases.push(-140 * Math.PI / 180);
  }

  positions.push(0.0);
  amps.push(1.0);
  phases.push(0.0);

  for (let i = 1; i <= nDir; i++) {
    positions.push(i * dirSpacing);
    amps.push(0.8);
    phases.push(60 * Math.PI / 180);
  }

  return { positions, amps, phases };
}

// ---------- Simple elevation element factor ----------
function elevationElementFactor(elevRad) {
  return Math.abs(Math.cos(elevRad));
}

// ---------- Array factor ----------
function arrayFactor(theta, phi, k, positions, amps, phases) {
  let re = 0, im = 0;
  let sx = Math.sin(theta) * Math.cos(phi);
  for (let i = 0; i < positions.length; i++) {
    let phase = phases[i] + k * positions[i] * sx;
    re += amps[i] * Math.cos(phase);
    im += amps[i] * Math.sin(phase);
  }
  return Math.sqrt(re*re + im*im);
}

// ---------- Azimuth pattern ----------
function computeAzimuthPattern(lambda, hasRef, nDir) {
  let angles = [];
  let dBs = [];

  if (!hasRef && nDir === 0) {
    for (let deg = 0; deg < 360; deg += 2) {
      angles.push(deg);
      dBs.push(0);
    }
    return { angles, dBs };
  }

  let k = 2 * Math.PI / lambda;
  let { positions, amps, phases } = buildArrayModel(hasRef, nDir, lambda);

  let theta = 90 * Math.PI / 180;
  let ef = elevationElementFactor(0);

  let vals = [];
  let maxVal = 0;

  for (let deg = 0; deg < 360; deg += 2) {
    let phi = deg * Math.PI / 180;
    let field = arrayFactor(theta, phi, k, positions, amps, phases) * ef;
    vals.push(field);
    if (field > maxVal) maxVal = field;
    angles.push(deg);
  }

  for (let v of vals) {
    let d = 20 * Math.log10(v / (maxVal || 1));
    if (!isFinite(d)) d = -60;
    if (d < -30) d = -30;
    dBs.push(d);
  }

  return { angles, dBs };
}

// ---------- Elevation pattern ----------
function computeElevationPattern(lambda, hasRef, nDir) {
  let k = 2 * Math.PI / lambda;
  let { positions, amps, phases } = buildArrayModel(hasRef, nDir, lambda);

  let phi = 0;
  let angles = [], dBs = [], vals = [], maxVal = 0;

  for (let elev = 0; elev <= 90; elev++) {
    let elevRad = elev * Math.PI / 180;
    let theta = (90 - elev) * Math.PI / 180;

    let ef = elevationElementFactor(elevRad);

    let af;
    if (!hasRef && nDir === 0) {
      af = 1.0;
    } else {
      af = arrayFactor(theta, phi, k, positions, amps, phases);
    }

    let field = af * ef;
    vals.push(field);
    if (field > maxVal) maxVal = field;
    angles.push(elev);
  }

  for (let v of vals) {
    let d = 20 * Math.log10(v / (maxVal || 1));
    if (!isFinite(d)) d = -60;
    if (d < -30) d = -30;
    dBs.push(d);
  }

  return { angles, dBs };
}

// ---------- Azimuth gain analysis ----------
function analyzeAzimuth(az, forwardAbs_dBi) {
  let angles = az.angles;
  let dBs = az.dBs;

  let fAbs_dBi = forwardAbs_dBi;
  let fAbs_dBd = fAbs_dBi - 2.15;

  let bIdx = angles.indexOf(180);
  let bRel = (bIdx !== -1) ? dBs[bIdx] : Math.min(...dBs);
  let bAbs_dBi = fAbs_dBi + bRel;
  let fbRatio = fAbs_dBi - bAbs_dBi;

  let thr3 = -3;
  let valid3 = angles.filter((a, i) => dBs[i] >= thr3);
  let bw3 = valid3.length ? (Math.max(...valid3) - Math.min(...valid3)) : 360;

  let thr10 = -10;
  let valid10 = angles.filter((a, i) => dBs[i] >= thr10);
  let bw10 = valid10.length ? (Math.max(...valid10) - Math.min(...valid10)) : 360;

  let mainMin = valid3.length ? Math.min(...valid3) : 0;
  let mainMax = valid3.length ? Math.max(...valid3) : 0;
  let sideRel = -30;
  for (let i = 0; i < angles.length; i++) {
    let a = angles[i];
    if (a < mainMin || a > mainMax) {
      if (dBs[i] > sideRel) sideRel = dBs[i];
    }
  }
  let sideAbs_dBi = fAbs_dBi + sideRel;
  let fsRatio = fAbs_dBi - sideAbs_dBi;

  let sumLin = 0;
  for (let d of dBs) sumLin += Math.pow(10, d / 10);
  let avgLin = sumLin / dBs.length;
  let effPct = avgLin * 100;

  return {
    forwardAbs_dBi: fAbs_dBi,
    forwardAbs_dBd: fAbs_dBd,
    backAbs_dBi: bAbs_dBi,
    fbRatio: fbRatio,
    bw3: bw3,
    bw10: bw10,
    sideAbs_dBi: sideAbs_dBi,
    fsRatio: fsRatio,
    effPct: effPct
  };
}

// ---------- 3D pattern ----------
function compute3DPattern(lambda, hasRef, nDir, forwardAbs_dBi) {
  let k = 2 * Math.PI / lambda;
  let { positions, amps, phases } = buildArrayModel(hasRef, nDir, lambda);

  let thetaSteps = 181;
  let phiSteps = 361;

  let thetaVals = [];
  let phiVals = [];
  for (let i = 0; i < thetaSteps; i++) thetaVals.push(i * Math.PI / 180);
  for (let j = 0; j < phiSteps; j++) phiVals.push(j * Math.PI / 180);

  let maxField = 0;
  let fieldGrid = new Array(thetaSteps);

  for (let i = 0; i < thetaSteps; i++) {
    fieldGrid[i] = new Array(phiSteps);
    let theta = thetaVals[i];
    let elev = (90 - (theta * 180 / Math.PI)) * Math.PI / 180;
    let ef = elevationElementFactor(elev);

    for (let j = 0; j < phiSteps; j++) {
      let phi = phiVals[j];

      let af;
      if (!hasRef && nDir === 0) {
        af = 1.0;
      } else {
        af = arrayFactor(theta, phi, k, positions, amps, phases);
      }

      let field = af * ef;
      fieldGrid[i][j] = field;
      if (field > maxField) maxField = field;
    }
  }

  if (maxField <= 0) maxField = 1;

  let x = [], y = [], z = [], gain = [];

  for (let i = 0; i < thetaSteps; i++) {
    let theta = thetaVals[i];
    let xRow = [], yRow = [], zRow = [], gRow = [];

    for (let j = 0; j < phiSteps; j++) {
      let phi = phiVals[j];
      let rel = fieldGrid[i][j] / maxField;
      let rel_dB = 20 * Math.log10(rel);
      if (!isFinite(rel_dB)) rel_dB = -60;
      let abs_dBi = forwardAbs_dBi + rel_dB;

      let r = Math.max(0, abs_dBi - (forwardAbs_dBi - 30));
      let st = Math.sin(theta);
      let ct = Math.cos(theta);
      let sp = Math.sin(phi);
      let cp = Math.cos(phi);

      xRow.push(r * st * cp);
      yRow.push(r * st * sp);
      zRow.push(r * ct);
      gRow.push(abs_dBi);
    }

    x.push(xRow);
    y.push(yRow);
    z.push(zRow);
    gain.push(gRow);
  }

  return { x, y, z, gain };
}

// ---------- Plot updater ----------
function updatePlots(lambda, hasRef, nDir, forwardAbs_dBi, fMHz) {
  let az = computeAzimuthPattern(lambda, hasRef, nDir);
  let el = computeElevationPattern(lambda, hasRef, nDir);

  // Azimuth
  Plotly.newPlot("azimuthPlot", [{
    type: "scatterpolar",
    r: az.dBs,
    theta: az.angles,
    mode: "lines",
    line: { color: "blue" }
  }], {
    title: "Azimuth Pattern (Horizontal, dBi-normalized)",
    polar: {
      radialaxis: { range: [-30, 0], dtick: 5, angle: 90 },
      angularaxis: { direction: "counterclockwise" }
    }
  });

  document.getElementById("azFreq").innerHTML =
    `Azimuth Pattern — ${fMHz.toFixed(3)} MHz`;

  // Elevation
  let elAbs = el.dBs.map(d => d + forwardAbs_dBi);
  let minEl = forwardAbs_dBi - 30;
  let maxEl = forwardAbs_dBi;

  Plotly.newPlot("elevationPlot", [{
    x: el.angles,
    y: elAbs,
    mode: "lines",
    line: { color: "red", width: 3 }
  }], {
    title: "Elevation Pattern (0–90° above horizon, Absolute Gain)",
    xaxis: { title: "Elevation Angle above Horizon (degrees)", range: [0, 90] },
    yaxis: { title: "Gain (dBi)", range: [minEl, maxEl], dtick: 5 }
  });

  document.getElementById("elFreq").innerHTML =
    `Elevation Pattern — ${fMHz.toFixed(3)} MHz`;

  // Compute TOA
  let maxVal = -Infinity;
  let maxIdx = 0;
  for (let i = 0; i < elAbs.length; i++) {
    if (elAbs[i] > maxVal) {
      maxVal = elAbs[i];
      maxIdx = i
